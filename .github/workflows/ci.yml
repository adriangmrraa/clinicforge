name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install ruff
      - run: ruff check orchestrator_service/ whatsapp_service/ --output-format=github

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: clinicforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r orchestrator_service/requirements.txt
      - run: pip install pytest pytest-asyncio httpx
      - name: Run Alembic migrations
        run: cd orchestrator_service && alembic upgrade head
        env:
          POSTGRES_DSN: postgresql://test:test@localhost:5432/clinicforge_test
      - run: pytest tests/ -v
        env:
          POSTGRES_DSN: postgresql://test:test@localhost:5432/clinicforge_test
          REDIS_URL: redis://localhost:6379
          ADMIN_TOKEN: test-token-with-at-least-32-characters-here
          JWT_SECRET_KEY: test-jwt-secret-key

  lint-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend_react/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend_react/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build
