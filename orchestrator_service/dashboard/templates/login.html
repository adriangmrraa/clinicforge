<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login CEO - Dra. Laura Delgado</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --danger: #ef4444;
            --gray-100: #f3f4f6;
            --gray-700: #374151;
            --gray-900: #111827;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 8px;
        }
        
        .login-header p {
            color: var(--gray-700);
            font-size: 14px;
        }
        
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .form-group label {
            font-weight: 500;
            color: var(--gray-900);
            font-size: 14px;
        }
        
        .form-group input {
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        
        .error-message {
            background: #fee2e2;
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            border-left: 4px solid var(--danger);
        }
        
        .login-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .login-btn:hover {
            background: var(--primary-dark);
        }
        
        .login-btn:active {
            transform: translateY(1px);
        }
        
        .login-footer {
            margin-top: 30px;
            text-align: center;
            font-size: 12px;
            color: var(--gray-700);
            border-top: 1px solid #e5e7eb;
            padding-top: 20px;
        }
        
        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .brand-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
        }
        
        .brand-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--gray-900);
        }
        
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            
            .login-header h1 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="brand">
            <div class="brand-icon">👑</div>
            <div class="brand-text">CEO Dashboard</div>
        </div>
        
        <div class="login-header">
            <h1>Acceso Restringido</h1>
            <p>Dashboard privado para el CEO</p>
        </div>
        
        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}
        
        <form class="login-form" method="POST" action="/dashboard/login">
            <div class="form-group">
                <label for="access_key">Clave de Acceso CEO</label>
                <input 
                    type="password" 
                    id="access_key" 
                    name="access_key" 
                    placeholder="Ingresa la clave de acceso"
                    required
                    autofocus
                >
            </div>
            
            <button type="submit" class="login-btn">
                🔐 Ingresar al Dashboard
            </button>
        </form>
        
        <div class="login-footer">
            <p>Este dashboard contiene información confidencial del negocio.</p>
            <p>Acceso restringido únicamente al CEO.</p>
        </div>
    </div>
    
    <script>
        // Auto-focus en el campo de clave
        document.getElementById('access_key').focus();
        
        // Prevenir re-submit del formulario
        let formSubmitted = false;
        document.querySelector('form').addEventListener('submit', function(e) {
            if (formSubmitted) {
                e.preventDefault();
                return;
            }
            formSubmitted = true;
            this.querySelector('button').textContent = 'Verificando...';
            this.querySelector('button').disabled = true;
        });
        
        // Mostrar/ocultar clave
        const input = document.getElementById('access_key');
        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                this.form.submit();
            }
        });
    </script>
</body>
</html>
