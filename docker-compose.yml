version: '3.8'
services:
  # --- New Microservices ---
  bff_service:
    build: ./bff_service
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - ORCHESTRATOR_URL=http://orchestrator_service:8000
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:4173}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M
    depends_on:
      orchestrator_service:
        condition: service_healthy

  frontend_react:
    build: ./frontend_react
    ports:
      - "4173:80"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.1'
        reservations:
          memory: 32M
    depends_on:
      bff_service:
        condition: service_healthy

  # --- Existing Backend Services ---

  orchestrator_service:
    build: ./orchestrator_service
    # Port not exposed to host — only accessible via BFF on Docker network
    volumes:
      - orchestrator_uploads:/app/uploads
      - orchestrator_media:/app/media
    environment:
      - WHATSAPP_SERVICE_URL=http://whatsapp_service:8002
      - REDIS_URL=redis://redis:6379
      - POSTGRES_DSN=${POSTGRES_DSN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - META_SERVICE_URL=http://meta_service:8000
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health/ready" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1536M
          cpus: '1.0'
        reservations:
          memory: 512M
    depends_on:
      - redis
      - postgres

  whatsapp_service:
    build: ./whatsapp_service
    # Port not exposed to host — internal service only
    environment:
      - YCLOUD_API_KEY=${YCLOUD_API_KEY}
      - YCLOUD_WEBHOOK_SECRET=${YCLOUD_WEBHOOK_SECRET}
      - INTERNAL_API_TOKEN=${INTERNAL_API_TOKEN}
      - ORCHESTRATOR_SERVICE_URL=http://orchestrator_service:8000
      - REDIS_URL=redis://redis:6379
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8002/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    depends_on:
      - redis
      - orchestrator_service

  meta_service:
    build: ./meta_service
    # Port not exposed to host — internal service only
    environment:
      - PORT=8000
      - META_APP_ID=${META_APP_ID}
      - META_APP_SECRET=${META_APP_SECRET}
      - META_VERIFY_TOKEN=${META_VERIFY_TOKEN}
      - META_GRAPH_API_VERSION=v22.0
      - ORCHESTRATOR_URL=http://orchestrator_service:8000
      - INTERNAL_SECRET_KEY=${INTERNAL_API_TOKEN}
      - FRONTEND_URL=${FRONTEND_URL}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 128M
    depends_on:
      - orchestrator_service

  telegram_service:
    build: ./telegram_service
    # Port not exposed to host — internal service, webhooks proxied via BFF/nginx
    environment:
      - ORCHESTRATOR_URL=http://orchestrator_service:8000
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - TELEGRAM_SERVICE_PORT=8003
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8003/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M
    depends_on:
      - orchestrator_service

  # --- Infrastructure ---

  redis:
    image: "redis:alpine"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 64M

  postgres:
    image: "postgres:13"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    # Port not exposed to host — only accessible on Docker network
    shm_size: '128m'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
        reservations:
          memory: 256M

volumes:
  postgres_data:
  postgres_backups:
  orchestrator_uploads:
  orchestrator_media:
